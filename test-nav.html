<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test Navigation</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }
        
        .test-container {
            max-width: 428px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            position: relative;
            padding-bottom: 84px;
        }
        
        .test-content {
            padding: 20px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        
        .box {
            background: #e3f2fd;
            height: 100px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #2196F3;
        }
        
        .debug-info {
            background: #fff3e0;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="test-content">
            <h1>Test de Navegación</h1>
            <p>Este es un contenedor de 428px (iPhone 14 Pro Max)</p>
            
            <div class="debug-info">
                <strong>Información de debug:</strong><br>
                - Ancho contenedor: 428px<br>
                - Ancho ventana: <span id="windowWidth"></span>px<br>
                - Bottom nav debería estar centrado dentro de 428px
            </div>
            
            <div class="grid">
                <div class="box">1</div>
                <div class="box">2</div>
                <div class="box">3</div>
                <div class="box">4</div>
            </div>
            
            <p>Contenido de prueba para hacer scroll...</p>
            <div style="height: 800px; background: linear-gradient(to bottom, #f5f5f5, #e0e0e0); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <p>Área de scroll</p>
            </div>
        </div>
        
        <!-- Bottom Navigation -->
        <div class="bottom-nav-container">
            <nav class="bottom-nav">
            <a href="#" class="nav-item active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>INICIO</span>
            </a>
            <a href="#" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span>PERFIL</span>
            </a>
            <a href="#" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                <span>TAREAS</span>
            </a>
            <a href="#" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                </svg>
                <span>TIENDA</span>
            </a>
        </nav>
        </div>
    </div>
    
    <script>
        document.getElementById('windowWidth').textContent = window.innerWidth;
        window.addEventListener('resize', function() {
            document.getElementById('windowWidth').textContent = window.innerWidth;
        });
    </script>
</body>
</html>
