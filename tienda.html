<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tienda - Mangle Coins</title>
    <link rel="stylesheet" href="css/styles.css?v=2">
    <link rel="stylesheet" href="css/tienda.css?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <button class="back-btn" onclick="window.history.back()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h1 class="page-title">Tienda</h1>
                <div class="header-actions">
                    <button class="notification-btn">
                        <i class="fas fa-bell"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Balance Card -->
            <div class="balance-card">
                <div class="balance-info">
                    <span class="balance-label">TUS MANGLE COINS</span>
                    <div class="balance-amount">
                        <span class="amount-number">0</span>
                        <span class="currency">MC</span>
                    </div>
                </div>
                <div class="balance-actions">
                    <button class="btn btn-outline">
                        <i class="fas fa-history"></i>
                        Historial
                    </button>
                    <button class="btn btn-outline">
                        <i class="fas fa-gift"></i>
                        Canjear
                    </button>
                </div>
            </div>

            <!-- Categories -->
            <div class="categories-section">
                <h2 class="section-title">Categorías</h2>
                <div class="categories-grid">
                    <button class="category-btn active" data-category="all">
                        <i class="fas fa-star"></i>
                        <span>Todos</span>
                    </button>
                    <button class="category-btn" data-category="digital">
                        <i class="fas fa-gamepad"></i>
                        <span>Digital</span>
                    </button>
                    <button class="category-btn" data-category="food">
                        <i class="fas fa-utensils"></i>
                        <span>Comida</span>
                    </button>
                    <button class="category-btn" data-category="merch">
                        <i class="fas fa-tshirt"></i>
                        <span>Merch</span>
                    </button>
                    <button class="category-btn" data-category="experiences">
                        <i class="fas fa-ticket-alt"></i>
                        <span>Experiencias</span>
                    </button>
                </div>
            </div>

            <!-- Products Grid -->
            <div class="products-section">
                <div class="section-header">
                    <h2 class="section-title">Productos Disponibles</h2>
                    <div class="sort-dropdown">
                        <select id="sortProducts">
                            <option value="price-low">Precio: Bajo a Alto</option>
                            <option value="price-high">Precio: Alto a Bajo</option>
                            <option value="popular">Más Populares</option>
                            <option value="new">Más Nuevos</option>
                        </select>
                    </div>
                </div>
                
                <div class="products-grid" id="productsContainer">
                    <!-- Productos cargados dinámicamente -->
                    <div class="loading-state">
                        <div class="loading-spinner"></div>
                        <p>Cargando productos...</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="/" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Inicio</span>
            </a>
            <a href="/tienda" class="nav-item active">
                <i class="fas fa-store"></i>
                <span>Tienda</span>
            </a>
            <a href="/tareas" class="nav-item">
                <i class="fas fa-tasks"></i>
                <span>Tareas</span>
            </a>
            <a href="/perfil" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Perfil</span>
            </a>
        </nav>
    </div>

    <!-- JavaScript -->
    <script src="js/database.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/app.js" defer></script>
    <script src="js/tienda.js" defer></script>
</body>
</html>
