<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tareas - Mangle Coins</title>
    <link rel="stylesheet" href="css/styles.css?v=2">
    <link rel="stylesheet" href="css/tareas.css?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <button class="back-btn" onclick="window.history.back()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h1 class="page-title">Mis Tareas</h1>
                <div class="header-actions">
                    <button class="notification-btn">
                        <i class="fas fa-bell"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Stats Overview -->
            <div class="stats-overview">
                <div class="stat-card">
                    <div class="stat-icon completed">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value">0</span>
                        <span class="stat-label">Completadas</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon pending">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value">0</span>
                        <span class="stat-label">Pendientes</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon earnings">
                        <i class="fas fa-coins"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value">0</span>
                        <span class="stat-label">MC Ganados</span>
                    </div>
                </div>
            </div>


            <!-- Tasks List -->
            <div class="tasks-section">
                <div class="section-header">
                    <h2 class="section-title">Tareas Activas</h2>
                    <button class="btn btn-small" id="refreshTasks">
                        <i class="fas fa-sync-alt"></i>
                        Actualizar
                    </button>
                </div>
                
                <div class="tasks-list" id="tasksContainer">
                    <!-- Tareas cargadas dinámicamente -->
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-tasks"></i>
                        </div>
                        <h3>No hay tareas asignadas</h3>
                        <p>¡Participá en actividades para ganar Mangle Coins!</p>
                        <a href="/" class="btn btn-primary">
                            <i class="fas fa-plus"></i>
                            Ver Actividades
                        </a>
                    </div>
                </div>
            </div>

            <!-- Completed Tasks -->
            <div class="completed-section" id="completedSection" style="display: none;">
                <div class="section-header">
                    <h2 class="section-title">Tareas Completadas</h2>
                    <button class="btn btn-small btn-outline" id="toggleCompleted">
                        <i class="fas fa-chevron-up"></i>
                        Ocultar
                    </button>
                </div>
                
                <div class="completed-list" id="completedContainer">
                    <!-- Tareas completadas cargadas dinámicamente -->
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="/" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Inicio</span>
            </a>
            <a href="/tienda" class="nav-item">
                <i class="fas fa-store"></i>
                <span>Tienda</span>
            </a>
            <a href="/tareas" class="nav-item active">
                <i class="fas fa-tasks"></i>
                <span>Tareas</span>
            </a>
            <a href="/perfil" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Perfil</span>
            </a>
        </nav>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- JavaScript -->
    <script src="js/database.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/app.js" defer></script>
    <script src="js/tareas.js" defer></script>
</body>
</html>
